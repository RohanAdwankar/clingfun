<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>clingfun</title>
    <link data-trunk rel="rust" data-bin="clingfun" />
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background:
          radial-gradient(circle at top, #24435f 0%, #112032 35%, #08111d 100%);
      }

      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: transparent;
      }

      body {
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #d6e7ff;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading clingfun...</div>
    <canvas id="clingfun-canvas"></canvas>
  </body>
</html>
